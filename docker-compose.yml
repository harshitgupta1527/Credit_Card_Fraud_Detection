version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persists SQLite local database file
      - ./backend/fraud_detection.db:/app/fraud_detection.db
    environment:
      - DATABASE_URL=sqlite:///./fraud_detection.db
      - SECRET_KEY=9f8a3d6b2c5e1f0a7b4c8d3e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a
      - CORS_ORIGINS=http://localhost,http://127.0.0.1
    restart: always

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
